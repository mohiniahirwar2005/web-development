<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h3>Application Form</h3>
    <form>
      <label for="first name"><b>First Name:</b></label>
      <input type="text">
      <label for="last name"><b>Last Name:</b></label>
      <input type="text">
      <br>
      <br>
      <label for="date of birth"><b>Date of birth:</b></label>
      <input type="date">
      <label for="age"><b>Age:</b></label>
      <input type="number">
      <br>
      <br>
      <label for="Gender"><b>Gender:</b></label>
      <select>
        <option value="">Male</option>
        <option>Female</option>
        <option>Other</option>
      </select>
      <label for="email address"><b>Email Address:</b></label>
      <input type="email" placeholder="Enter email address">
      <br>
      <br>
      <label for="positions available"><b>Positions Available:</b></label>
      <input type="radio">
      <label for="junior developer"><b>Junior Developer</b></label>
      <input type="radio">
      <label for="mid-level developer"><b>Mis-level Developer</b></label>
      <input type="radio">
      <label for="senior developer"><b>Senior Developer</b></label>
      <br>
      <br>
      <label for="programming languages"><b>Programming Languages:</b></label>
      <input type="checkbox">
      <label for="java"><b>Java</b></label>
      <input type="checkbox">
      <label for="jvascript"><b>JavaScript</b></label>
      <input type="checkbox">
      <label for="python"><b>Python</b></label>
      <br>
      <br>
      <label for="password"><b>Password:</b></label>
      <input type="password">
      <label for="confirm password"><b>Confirm Password:</b></label>
      <input type="password">
      <br>
      <br>
      <button value="submit">Submit</button>
      <button value="reset">Reset</button>
    </form>
  </body>
</html>
