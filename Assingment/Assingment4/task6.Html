<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h>Registration Form: Dance Club</h>
    <hr>
    <form>
        <table border="1" cellpadding="5" cellspacing="2">
            <tr>
                <td>Name:</td>
                <td><input type="text>"</td>
            </tr>
            <tr>
                <td>IC No:</td>
                <td>
                    <input type="text" size="5">-
                    <input type="text" size="5">-
                    <input type="text" size="5">
                </td>
            </tr>
            <tr>
                <td>Address:</td>
                <td><textarea rows="4" cols="4"></textarea></td>
            </tr>
            <tr>
                <td>Gender:</td>
                <td>
                    <input type="radio" name="gender">male
                    <input type="radio" name="gender">Female
                </td>
            </tr>
            <tr>
                <td>Dance Type:</td>
                <td>
                    <input type="checkbox"> Zapin
                    <input type="checkbox"> Joget
                    <input type="checkbox"> Inang
                    <input type="checkbox"> Lion Dance
                </td>
            </tr>
            <tr>
                <td>competition:</td>
                <td>
                    <select size="3">
                        <option>State Level</option>
                        <option>National Level</option>
                        <option>International Level</option>
                    </select>
                </td>
            </tr>
            <tr>
                <td>Natinolity:</td>
                <td>
                    <select>
                        <option>--please select--</option>
                        <option>Indian</option>
                        <option>Malaysian</option>
                        <option>Other</option>
                    </select>
                </td>
            </tr>
            <tr>
                <td>Password:</td>
                <td><input type="password"></td>
            </tr>
            <tr>
                <td colspan="2">
                    <button type="submit" value="Register Me">Register Me</button>
                    <button type="reset" value="Cencel">Cencel</button>
                </td>
            </tr>
        </table>
    </form>
</body>
</html>
