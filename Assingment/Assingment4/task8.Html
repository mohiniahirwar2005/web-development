<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form>
        <fieldset>
            <h4>Farewell Party Survey Form</h4>
            <label for="name">Name</label>
            <input type="text" placeholder="Enter your name">
            <br>
            <label for="email">Email</label>
            <input type="email" placeholder="Enter your email">
            <br>
            <label for="age">Age</label>
            <input type="number" placeholder="Enter your age">
            <br>
            <label for="which option best describes you?">Which option best describes you?</label>
            <select>
                <option>Student</option>
            </select>
            <br>
            <br>
            <label for="will you attend the party">Will you attend the party?</label>
            <input type="radio">
            <label for="yes">Yes</label>
            <input type="radio">
            <label for="no">No</label>
            <br>
            <br>
            <label for="what did you like about the program?">What did you like about the program?</label>
            <br>
            <input type="checkbox">Training
            <br>
            <input type="checkbox">The Learning Sessions from Industry Experts
            <br>
            <input type="checkbox">Community Meetups
            <br>            
            <input type="checkbox">Brown Bag Sessions
            <br>
            <input type="checkbox">Switching to Hybrid Mode
            <br>
            <input type="checkbox">Food, Office etc.
            <br>
            <label for="any comments or suggestion">Any comments or suggestions</label>
             <textarea></textarea>
             <br>
             <button type="reset" value="reset">Reset</button>
             <button type="submit" value="submit">Submit</button>
        </fieldset>
    </form>
</body>
</html>
