<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h4>Registration Form</h4>
    <form>
        <label for="first name"><b>First Name:</b></label>
        <input type="text" id="first name" placeholder="Enter First Name">
        <br>
        <label for="last name"><b>Last Name:</b></label>
        <input type="text" id="last name" placeholder="Enter Last Name">
        <br>
        <label for="Email"><b>Email:</b></label>
        <input type="email" id="email" placeholder="Enter Email Address">
        <br>
        <label for="password"><b>Password:</b></label>
        <input type="password">
        <br>
        <label for="Gender"><b>Gender:</b></label>
        <br>
        <label for="Male"><b>Male</b></label>
        <input type="radio" name="Gender">
        <br>
        <label for="Female"><b>Female</b></label>
        <input type="radio" name="Gender">
        <br>
        <label for="Other"><b>Other</b></label>
        <input type="radio" name="Gender">
        <br>
        <label for="Age"><b>Age:</b></label>
        <input type="number" id="Age">
        <br>
        <label for="Preferemces"><b>Preferences:</b></label>
        <br>
        <label for="Acrylic Painting"><b>Acrylic Painting</b></label>
        <input type="checkbox">
        <br>
        <label for="Oil Painting"><b>Oil Painting</b></label>
        <input type="checkbox">
        <br>
        <label for="Water Color Painting"><b>Water Color Painting</b></label>
        <input type="checkbox">
        <br>
        <label for="Select Occupation:"><b>Select Occupation:</b></label>
        <select>
          <option value="">Select Occupation</option>
          <option>Student</option>
          <option>Teacher</option>
          <option>Artist</option>
        </select>
        <br>
        <label for="bio"><b>Bio:</b></label>
        <textarea rows="4" cols="40" placeholder="Share few lines about yourself......"></textarea>
        <br>
        <br>
        <button type="reset">RESET</button>
        <button type="submit">SUBMIT</button>
    </form>
    <br>
    <a href="./subindex.Html">Back to subindex</a>
    <br><br>
    <a href="../index2.Html">Back to Home</a>
  </body>
</html>
