<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h3>User Input Form</h3>
    <form>
      <fieldset>
        <legend>Personal Particular</legend>
        <label for="Name">Name:</label>
        <input type="text" />
        <br />
        <br />
        <label for="Password">Password:</label>
        <input type="text" />
        <br />
        <br />
        <label for="Gender">Gender:</label>
        <input type="radio" />
        <label for="Male">Male</label>
        <input type="radio" />
        <label for="Female">Female</label>
        <br />
        <br />
        <label for="age">Age:</label>
        <select>
          <option><1 year old</option>
          <option>1 year old</option>
          <option>2 year old</option>
          <option>3 year old</option>
          <option>4+ year old</option>
        </select>
      </fieldset>
      <fieldset>
        <legend>Languages</legend>
        <input type="checkbox" />
        <label for="Java">Java</label>
        <input type="checkbox" />
        <label for="c/c++">C/C++</label>
        <input type="checkbox" />
        <label for="c#">C#</label>
      </fieldset>
      <fieldset>
        <legend>Instruction</legend>
        <textarea
          name="instruction"
          rows="4"
          cols="50"
          placeholder="Enter your instruction here..."
        ></textarea>
        <br>
      </fieldset>
      <button type="Send" value="Send">SEND</button>
      <button type="Clear" value="Clear">CLEAR</button>
    </form>
    <br>
    <a href="./subindex.Html">Back to subindex</a>
    <br><br>
    <a href="../index2.Html">Back to Home</a>
  </body>
</html>
