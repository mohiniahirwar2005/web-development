<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Login & Registration</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>

  <body
    class="bg-primary d-flex justify-content-center align-items-center vh-100"
  >
    <div class="d-flex align-items-end gap-5">
      <div class="bg-white p-4 rounded shadow" >
        <h5 class="fw-bold mb-4 pb-1 d-inline-block">
          <span class="border-3 border-bottom border-primary"
            >Lo</span
          >gin
        </h5>

        <div class="mb-3 position-relative">
          <i
            class="fa fa-envelope position-absolute top-50 start-0 translate-middle-y ms-2 text-secondary"
          ></i>
          <input
            type="email"
            class="form-control border-0 border-bottom ps-5"
            placeholder="Enter your email"
          />
        </div>

        <div class="mb-3 position-relative">
          <i
            class="fa fa-lock position-absolute top-50 start-0 translate-middle-y ms-2 text-secondary"
          ></i>
          <input
            type="password"
            class="form-control border-0 border-bottom ps-5 pe-5"
            placeholder="Confirm a password"
          />
          <i
            class="fa fa-eye position-absolute top-50 end-0 translate-middle-y me-2 text-secondary"
          ></i>
        </div>

        <div class="d-flex justify-content-between small mb-3">
          <div><input type="checkbox" /> Remember me</div>
          <a href="#">Forgot password?</a>
        </div>

        <button class="btn btn-primary w-100">Login Now</button>

        <p class="text-center small mt-3">
          Don't have an account? <a href="#">Signup now</a>
        </p>
      </div>

      <div class="bg-white p-4 rounded shadow">
        <h5 class="fw-bold mb-4 pb-1 d-inline-block">
          <span class="border-3 border-bottom border-primary"
            >Re</span
          >stration
        </h5>

        <div class="mb-3 position-relative">
          <i
            class="fa fa-user position-absolute top-50 start-0 translate-middle-y ms-2 text-secondary"
          ></i>
          <input
            type="text"
            class="form-control border-0 border-bottom ps-5"
            placeholder="Enter your name"
          />
        </div>

        <div class="mb-3 position-relative">
          <i
            class="fa fa-envelope position-absolute top-50 start-0 translate-middle-y ms-2 text-secondary"
          ></i>
          <input
            type="email"
            class="form-control border-0 border-bottom ps-5"
            placeholder="Enter your email"
          />
        </div>

        <div class="mb-3 position-relative">
         
          <input
            type="password"
            class="form-control border-0 border-bottom ps-5 pe-5"
            placeholder="Create a password"
          />
         <i
            class="fa fa-lock position-absolute top-50 start-0 translate-middle-y ms-2 text-secondary"
          ></i>
        </div>

        <div class="mb-3 position-relative">
          <i
            class="fa fa-lock position-absolute top-50 start-0 translate-middle-y ms-2 text-secondary"
          ></i>
          <input
            type="password"
            class="form-control border-0 border-bottom ps-5 pe-5"
            placeholder="Confirm a password"
          />
          <i
            class="fa fa-eye position-absolute top-50 end-0 translate-middle-y me-2 text-secondary"
          ></i>
        </div>

        <div class="small mb-3">
          <input type="checkbox" /> I accept all terms & conditions
        </div>

        <button class="btn btn-primary w-100">Register Now</button>

        <p class="text-center small mt-3">
          Already have an account? <a href="#">Login now</a>
        </p>
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
