<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login & Registration</title>
    <link rel="stylesheet" href="style.css" />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>
  <body>
    <div class="container">
      <div class="box">
        <h2>Login</h2>

        <div class="input-box">
          <i class="fa fa-envelope"></i>
          <input type="email" placeholder="Enter your email" />
        </div>

        <div class="input-box">
          <i class="fa fa-lock"></i>
          <input type="password" id="loginPass" placeholder="Enter password" />
          <i
            class="fa fa-eye toggle"
            onclick="togglePassword('loginPass', this)"
          ></i>
        </div>

        <div class="row">
          <label><input type="checkbox" /> Remember me</label>
          <a href="#">Forgot password?</a>
        </div>

        <button>Login Now</button>

        <p>Don't have an account? <a href="#">Signup now</a></p>
      </div>

      <div class="box">
        <h2>Registration</h2>

        <div class="input-box">
          <i class="fa fa-user"></i>
          <input type="text" placeholder="Enter your name" />
        </div>

        <div class="input-box">
          <i class="fa fa-envelope"></i>
          <input type="email" placeholder="Enter your email" />
        </div>

        <div class="input-box">
          <i class="fa fa-lock"></i>
          <input type="password" id="regPass" placeholder="Create password" />
          <i
            class="fa fa-eye toggle"
            onclick="togglePassword('regPass', this)"
          ></i>
        </div>

        <div class="input-box">
          <i class="fa fa-lock"></i>
          <input
            type="password"
            id="regConfirm"
            placeholder="Confirm password"
          />
          <i
            class="fa fa-eye toggle"
            onclick="togglePassword('regConfirm', this)"
          ></i>
        </div>

        <div class="row">
          <label><input type="checkbox" /> Accept terms</label>
        </div>

        <button>Register Now</button>

        <p>Already have an account? <a href="#">Login now</a></p>
      </div>
    </div>

    <script>
      function togglePassword(id, icon) {
        let input = document.getElementById(id);
        if (input.type === "password") {
          input.type = "text";
          icon.classList.remove("fa-eye");
          icon.classList.add("fa-eye-slash");
        } else {
          input.type = "password";
          icon.classList.remove("fa-eye-slash");
          icon.classList.add("fa-eye");
        }
      }
    </script>
  </body>
</html>
