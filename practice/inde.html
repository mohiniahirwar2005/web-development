<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Basic HTML Practice</title>
</head>
<body>

    <!-- 1. Heading and Paragraph -->
    <h1>Welcome to My Website</h1>
    <p>This is my first paragraph.</p>

    <!-- Explanation -->
    <!-- <h1> tag is used for heading -->
    <!-- <p> tag is used for paragraph -->

    <hr>

    <!-- 2. Bold "Important:" -->
    <p><b>Important:</b> This is normal text.</p>

    <hr>

    <!-- 3. Bold, Italic, Underline -->
    <p><b>This is Bold Text</b></p>
    <p><i>This is Italic Text</i></p>
    <p><u>This is Underlined Text</u></p>

    <hr>

    <!-- 4. Superscript -->
    <p>E = mc<sup>2</sup></p>

    <hr>

    <!-- 5. Subscript -->
    <p>CO<sub>2</sub></p>

    <hr>

    <!-- 6. Line Break -->
    <p>Hello<br>World</p>

    <hr>

    <!-- 7. Horizontal Line Example -->
    <p>This is Section 1</p>
    <hr>
    <p>This is Section 2</p>

    <!-- Explanation -->
    <!-- <br> creates a simple line break (next line) -->
    <!-- <hr> creates a horizontal line (section divider) -->

</body>
</html>
