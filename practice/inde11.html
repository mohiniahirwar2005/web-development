<!DOCTYPE html>
<html>
<head>
    <title>All CSS Types</title>

    <!-- External CSS -->
    <link rel="stylesheet" href="style2.css">

    <!-- Internal CSS -->
    <style>
        h1 {
            color: green;
        }
    </style>

</head>
<body>

    <!-- Inline CSS -->
    <p style="color: red;">This is Inline CSS</p>

    <h1>This is Internal CSS</h1>

    <div>This is External CSS</div>

</body>
</html>
