<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HTML Forms Practice</title>
</head>
<body>

    <!-- 1. Simple Form (Name, Email, Submit) -->
    <h3>1. Basic Form</h3>
    <form>
        <label for="name">Name:</label>
        <input type="text" id="name" name="name"><br><br>

        <label for="email">Email:</label>
        <input type="text" id="email" name="email"><br><br>

        <input type="submit" value="Submit">
    </form>

    <hr>

    <!-- 2. Dropdown Menu -->
    <h3>2. Course Dropdown</h3>
    <form>
        <label for="course">Course:</label>
        <select id="course" name="course">
            <option>HTML</option>
            <option>CSS</option>
            <option>JavaScript</option>
        </select>
    </form>

    <hr>

    <!-- 3. Textarea -->
    <h3>3. Feedback Textarea</h3>
    <form>
        <label for="feedback">Feedback:</label><br>
        <textarea id="feedback" name="feedback" rows="3" cols="20"></textarea>
    </form>

    <hr>

    <!-- 4. Complete Form -->
    <h3>4. Complete Form</h3>
    <form>

        <!-- City Dropdown -->
        <label for="city">City:</label>
        <select id="city" name="city">
            <option>Delhi</option>
            <option>Mumbai</option>
            <option>Bhopal</option>
        </select><br><br>

        <!-- Feedback -->
        <label for="fb">Feedback:</label><br>
        <textarea id="fb" name="fb" rows="3" cols="20"></textarea><br><br>

        <!-- File Upload -->
        <label for="file">Upload File:</label>
        <input type="file" id="file" name="file"><br><br>

        <!-- Buttons -->
        <input type="submit" value="Submit">
        <input type="reset" value="Reset">

    </form>

</body>
</html>
