<!DOCTYPE html>
<html>
<head>
<style>
h1 {
    text-shadow: 2px 2px 5px blue;
}

p {
    font: italic 18px Arial;
    letter-spacing: 1px;
}

.box {
    border: 2px solid black;
    border-radius: 10px;
    padding: 20px;
    background-color: lightgray;
    box-shadow: 5px 5px 10px gray;
}
</style>
</head>
<body>

<h1>My Webpage</h1>

<p>This is a styled paragraph.</p>

<div class="box">Styled Div Box</div>

</body>
</html>
