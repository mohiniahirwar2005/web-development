<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
.container {
    display: flex;
    height: 150px;
    background: lightblue;
    margin: 10px 0;
}
.box { padding: 20px; background: red; }
.start { align-items: flex-start; }
.center { align-items: center; }
.end { align-items: flex-end; }
</style>
</head>
<body>
    

<div class="container start"><div class="box">Start</div></div>
<div class="container center"><div class="box">Center</div></div>
<div class="container end"><div class="box">End</div></div>
</body>
</html>
