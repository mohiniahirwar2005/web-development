<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Section and Form Example</title>
</head>
<body>

    <!-- 1. Single Section -->
    <section>
        <h2>Introduction</h2>
        <p>This is the introduction paragraph.</p>
    </section>

    <hr>

    <!-- 2. Multiple Sections -->
    <section>
        <h2>HTML</h2>
        <p>HTML is used to create structure of web pages.</p>
    </section>

    <section>
        <h2>CSS</h2>
        <p>CSS is used to style web pages.</p>
    </section>

    <hr>

    <!-- 3. Section with multiple elements -->
    <section>
        <h2>My Section</h2>
        <p>This section contains multiple elements.</p>
        <button>Click Me</button>
    </section>

    <hr>

    <!-- 4. Radio Buttons (Gender) -->
    <h3>Gender Selection</h3>
    <form>
        <label>
            <input type="radio" name="gender" value="male"> Male
        </label>
        <label>
            <input type="radio" name="gender" value="female"> Female
        </label>
    </form>

    <hr>

    <!-- 5. Checkboxes (Hobbies) -->
    <h3>Hobbies</h3>
    <form>
        <label>
            <input type="checkbox" name="hobby" value="html"> HTML
        </label>
        <label>
            <input type="checkbox" name="hobby" value="css"> CSS
        </label>
        <label>
            <input type="checkbox" name="hobby" value="js"> JavaScript
        </label>
    </form>

    <hr>

    <!-- 6. Complete Form -->
    <h3>Complete Form</h3>
    <form>

        <!-- Gender -->
        <p><b>Gender:</b></p>
        <label>
            <input type="radio" name="gender" value="male"> Male
        </label>
        <label>
            <input type="radio" name="gender" value="female"> Female
        </label>

        <br><br>

        <!-- Hobbies -->
        <p><b>Hobbies:</b></p>
        <label>
            <input type="checkbox" name="hobby" value="html"> HTML
        </label>
        <label>
            <input type="checkbox" name="hobby" value="css"> CSS
        </label>
        <label>
            <input type="checkbox" name="hobby" value="js"> JavaScript
        </label>

        <br><br>

        <!-- Submit -->
        <input type="submit" value="Submit">

    </form>

</body>
</html>
