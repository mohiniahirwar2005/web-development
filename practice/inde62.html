<head>

    <title>Document</title>
    <style>
.parent {
    position: relative;
    width: 300px;
    height: 200px;
    background: lightgray;
}
.child {
    position: absolute;
    top: 20px;
    left: 20px;
    background: red;
    padding: 10px;
}
</style>
</head>
<body>
    

<div class="parent">
    <div class="child">Child</div>
</div>
</body>
